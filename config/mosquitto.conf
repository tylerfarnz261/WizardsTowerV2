# Mosquitto MQTT Broker Configuration for Escape Room
# ====================================================
# 
# This configuration file should be placed at /etc/mosquitto/conf.d/escape_room.conf
# on the Raspberry Pi that will host the MQTT broker.

# Basic Settings
port 1883
bind_address 0.0.0.0

# Allow anonymous connections (change if security needed)
allow_anonymous true

# Persistence settings
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Connection settings
max_connections 50
keepalive_interval 60

# Message size limits
message_size_limit 1024

# Security settings (uncomment and configure if needed)
# password_file /etc/mosquitto/passwd
# acl_file /etc/mosquitto/acl

# Bridge settings (if connecting to external broker)
# connection external_broker
# address external.broker.com:1883
# topic escaperoom/# both 0

# WebSocket support (uncomment if needed)
# listener 9001
# protocol websockets